# ==============================================================================
# /etc/vec.conf — system-wide defaults for vec
# ==============================================================================
#
# Configuration hierarchy (later overrides earlier):
#   1. Built-in compiled defaults
#   2. /etc/vec.conf           (this file — distro/admin defaults)
#   3. CLI flags               (highest precedence)
#
# All settings are optional. Uncomment and change only what you need.
# Generate this file: vec init | sudo tee /etc/vec.conf
# ==============================================================================


# ------------------------------------------------------------------------------
# Embedding model
# ------------------------------------------------------------------------------

[embed]
# Model name (resolved via model_search_path) or absolute path to an ONNX file.
# Changing this requires `vec updatedb --full` — existing embeddings are incompatible.
model = "gte-multilingual-base"

# Directories searched for named models, in order. First match wins.
# model_search_path = ["/usr/share/vec/models"]

# Number of text chunks embedded per inference call.
# Higher = better throughput; lower = less peak RAM during indexing.
# batch_size = 16

# Maximum number of tokens passed to the model per chunk.
# Chunks exceeding this are truncated. Must not exceed the model's context length.
# max_tokens = 128

# OPTIONAL: Unix socket for the embedding daemon (`vec daemon` / vec-embed.service).
#
# vec tries this socket first for interactive queries, then falls back to
# loading the model in-process — behaviour is identical either way.
#
# The daemon keeps the compiled ONNX model in resident memory (150–300 MB)
# to make `vec <query>` near-instant. Only useful if you run vec interactively
# many times a day AND have RAM to spare. vec works fine without it.
#
# To use: systemctl enable --now vec-embed.service
# To disable: systemctl disable --now vec-embed.service
#
# daemon_socket = "/run/vec/embed.sock"


# ------------------------------------------------------------------------------
# Indexing behaviour
# ------------------------------------------------------------------------------

[index]
# Root paths to walk. Defaults to ["/"] — indexes everything the user can read.
# Specify to restrict system-wide indexing to meaningful paths.
# include_paths = ["/etc", "/home", "/root", "/opt", "/srv", "/usr/local", "/var/www"]

# Lines per chunk. Smaller = more granular results; larger = more context per result.
# chunk_size = 40

# Lines of overlap between adjacent chunks.
# Prevents concepts that straddle a boundary from being missed.
# chunk_overlap = 10

# Skip files larger than this (bytes). Prevents indexing huge binaries or logs.
# max_file_size = 10485760

# Skip files smaller than this (bytes). Avoids embedding near-empty files.
# min_file_size = 50

# Skip chunks with fewer non-blank lines than this — not worth embedding.
# min_chunk_lines = 5

# Respect .gitignore files found in indexed directories.
# Disable only if you intentionally want to index build artifacts.
# gitignore = true

# Extra directory names to skip — APPENDS to the compiled-in defaults.
# The compiled defaults already exclude: .git, node_modules, target, dist, build,
# __pycache__, .venv, .cache, .cargo, proc, sys, dev, run, ssl, certs,
# dpkg, apt, rpm, cloud, alternatives, dist-packages, site-packages,
# apparmor.d, iproute2, abi
# exclude_dirs = ["vendor", "third_party"]
#
# Optional: exclude SysVinit and rc script directories.
# These contain short shell boilerplate (case/esac dispatcher stubs) that embeds
# near the vector centroid and inflates scores for unrelated queries.
# Uncomment if you see /etc/init.d or /etc/rc*.d entries in unexpected results.
exclude_dirs = ["init.d", "rc0.d", "rc1.d", "rc2.d", "rc3.d", "rc4.d", "rc5.d", "rc6.d", "rcS.d"]

# Extra file glob patterns to skip — APPENDS to the compiled-in defaults.
# The compiled defaults already exclude: *.lock, *.min.js, *.map, *.pyc,
# .env, .env.*, *.key, *.pem, *.p12, *.pfx, *.onnx, *.bin, *.so, *.dylib
# exclude_files = ["*.generated.ts", "*.pb.go"]


# ------------------------------------------------------------------------------
# Database
# ------------------------------------------------------------------------------

[database]
# Path to the SQLite database. Default is the system-wide central DB (mode 644,
# owned by root; access() enforces per-user read permissions at query time).
# db_path = "/var/lib/vec/vec.db"

# Enable SQLite Write-Ahead Logging. Allows concurrent reads during indexing.
# wal = true


# ------------------------------------------------------------------------------
# Search
# ------------------------------------------------------------------------------

[search]
# Default number of results returned when --limit is not specified.
# default_limit = 10

# Lines of file context shown per result with --snippet.
# snippet_lines = 6
